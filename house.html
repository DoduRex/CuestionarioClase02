<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Tareas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
            padding: 20px;
        }

        .tarea-card {
            border-radius: 15px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .tarea-card:hover {
            transform: translateY(-5px);
        }

        iframe {
            width: 100%;
            height: 200px;
            border: none;
        }

        /* === Botón circular de regreso === */
        .boton-circular {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 12px rgba(8, 18, 153, 0.2);

            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1050;
        }

        /* === Efecto hover del botón circular === */
        .boton-circular:hover {
            background-color: #7473af;
            transform: scale(1.05);
            transition: 0.2s;
        }

    </style>
</head>

<body>
    <div class="container">
        <!-- Botón regresar -->
        <div class="mb-4">
            <button class="btn btn-light boton-circular" onclick="window.location.href='credencial.html'">
                <i class="bi bi-house"></i>
            </button>
        </div>

        <h1 class="mb-4 text-center">📘 Galería de Tareas</h1>

        <!-- Formulario para agregar tareas -->
        <div class="card p-3 mb-4">
            <form id="formTarea" class="row g-3">
                <div class="col-md-4">
                    <input type="text" id="titulo" class="form-control" placeholder="Título de la tarea" required>
                </div>
                <div class="col-md-6">
                    <input type="url" id="link" class="form-control" placeholder="Enlace de la tarea" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-success w-100">Agregar</button>
                </div>
            </form>
        </div>

        <!-- Contenedor de tareas -->
        <div class="row g-4" id="galeriaTareas">

            <!-- Tarea 1 precargada -->
            <div class="col-md-6">
                <div class="card tarea-card">
                    <div class="card-header text-center fw-bold">Cuestionario Clase 01</div>
                    <iframe src="https://dodurex.github.io/CuestionarioClase01/index.html"></iframe>
                    <div class="card-body text-center">
                        <a href="https://dodurex.github.io/CuestionarioClase01/index.html" target="_blank"
                            class="btn btn-primary">Ingresar</a>
                    </div>
                </div>
            </div>

            <!-- Tarea 2 precargada -->
            <div class="col-md-6">
                <div class="card tarea-card">
                    <div class="card-header text-center fw-bold">Cuestionario Clase 02</div>
                    <iframe src="https://dodurex.github.io/CuestionarioClase02/index.html"></iframe>
                    <div class="card-body text-center">
                        <a href="https://dodurex.github.io/CuestionarioClase02/index.html" target="_blank"
                            class="btn btn-primary">Ingresar</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Script para agregar tareas dinámicamente
        document.getElementById("formTarea").addEventListener("submit", function (e) {
            e.preventDefault();

            const titulo = document.getElementById("titulo").value;
            const link = document.getElementById("link").value;

            // Crear la tarjeta de la tarea
            const col = document.createElement("div");
            col.className = "col-md-6";
            col.innerHTML = `
        <div class="card tarea-card">
          <div class="card-header text-center fw-bold">${titulo}</div>
          <iframe src="${link}"></iframe>
          <div class="card-body text-center">
            <a href="${link}" target="_blank" class="btn btn-primary">Ingresar</a>
          </div>
        </div>
      `;

            document.getElementById("galeriaTareas").appendChild(col);

            // Resetear formulario
            this.reset();
        });
    </script>
</body>

</html>
